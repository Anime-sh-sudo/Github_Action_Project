name: Deploy Static Website

on:
  push:
    branches:
      - master  # Triggers the pipeline every time you push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to WSL via SSH Tunnel
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          port: ${{ secrets.SERVER_PORT }} # The port provided by Pinggy
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "Successfully connected to WSL"
            cd /var/www/html
            # Pull the latest changes from GitHub to the server
            git pull origin master
            echo "Deployment successful!"
            script: |
            # 1. Enter the directory
            cd /var/www/html

            # 2. If .git is missing, set it up from scratch
            if [ ! -d ".git" ]; then
              echo "No git repo found. Initializing..."
              git init
              git remote add origin https://github.com/${{ github.repository }}.git
            fi

            # 3. Mark this directory as safe (Required by newer Git versions)
            git config --global --add safe.directory /var/www/html

            # 4. Fetch the absolute latest from GitHub
            # IMPORTANT: Ensure this is 'master' if that's what you are pushing to!
            git fetch origin master

            # 5. Overwrite EVERYTHING in /var/www/html with the GitHub version
            git reset --hard origin/master

            # 6. Fix permissions so Nginx can see it
            sudo chown -R $USER:www-data /var/www/html
            sudo chmod -R 755 /var/www/html

            echo "Deployment Complete!"
