name: Deploy Static Website

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to WSL via SSH Tunnel
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/html
            
            # Ensure the directory is safe
            git config --global --add safe.directory /var/www/html
            
            # Setup Git if missing
            if [ ! -d ".git" ]; then
              git init
              git remote add origin https://github.com/${{ github.repository }}.git
            fi
            
            # Sync code
            git fetch origin master
            git reset --hard origin/master
            
            # Clean subfolders
            rm -rf Github_Action_Project/ Github_Action_pipeline/
            
            # Fix Permissions (using sudo without password)
            sudo chown -R ${{ secrets.SERVER_USERNAME }}:www-data /var/www/html
            sudo chmod -R 755 /var/www/html
            
            echo "CI/CD Pipeline Finished Successfully!"
