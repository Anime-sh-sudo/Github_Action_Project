name: Deploy Static Website

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to WSL via SSH Tunnel
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Create the directory if it somehow doesn't exist
            sudo mkdir -p /var/www/html
            sudo chown -R ${{ secrets.SERVER_USERNAME }} /var/www/html
            cd /var/www/html

            # Force re-initialize git every time to fix 'fatal' errors
            rm -rf .git
            git init
            git remote add origin https://github.com/${{ github.repository }}.git

            # Use the token to avoid password prompts during fetch
            git fetch origin master
            git reset --hard origin/master

            # Cleanup any weird subfolders
            rm -rf Github_Action_Project/ Github_Action_pipeline/

            # Permissions fix
            sudo chmod -R 755 /var/www/html
            echo "CI/CD Pipeline Finished Successfully!"
